name: Build Debug APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Setup Gradle wrapper
        run: |
          mkdir -p android/gradle/wrapper

          # gradle-wrapper.properties
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # gradlew script - React Native resmi repo'sundan
          curl -sL -o android/gradlew \
            "https://raw.githubusercontent.com/facebook/react-native/v0.74.1/template/android/gradlew"

          # gradle-wrapper.jar - Apache Maven repo'sundan
          curl -sL -o android/gradle/wrapper/gradle-wrapper.jar \
            "https://search.maven.org/remotecontent?filepath=org/gradle/gradle-wrapper/gradle-wrapper/8.6/gradle-wrapper-8.6.jar"

          chmod +x android/gradlew

          # Doğrulama
          echo "gradlew boyutu: $(wc -c < android/gradlew) bytes"
          echo "wrapper.jar boyutu: $(wc -c < android/gradle/wrapper/gradle-wrapper.jar) bytes"

      - name: Create assets folder
        run: mkdir -p android/app/src/main/assets

      - name: Bundle JS
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: teleon-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: android/app/build/reports/
          retention-days: 7
