name: Build Debug APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Setup Gradle wrapper
        run: |
          mkdir -p android/gradle/wrapper

          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > android/gradlew << 'GRADLEW'
          #!/bin/sh
          APP_HOME=$(cd "$(dirname "$0")" && pwd -P)
          CLASSPATH="$APP_HOME/gradle/wrapper/gradle-wrapper.jar"
          exec java -Xmx64m -Xms64m \
            "-Dorg.gradle.appname=$(basename "$0")" \
            -classpath "$CLASSPATH" \
            org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW
          chmod +x android/gradlew

          curl -sL -o android/gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar"

          echo "gradlew: $(wc -c < android/gradlew) bytes"
          echo "wrapper.jar: $(wc -c < android/gradle/wrapper/gradle-wrapper.jar) bytes"

      - name: Create assets folder
        run: mkdir -p android/app/src/main/assets

      - name: Bundle JS
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Debug settings.gradle
        run: |
          echo "=== settings.gradle içeriği ==="
          cat android/settings.gradle
          echo ""
          echo "=== node_modules klasörü var mı? ==="
          ls node_modules/@react-native/gradle-plugin/ | head -5
          echo ""
          echo "=== Çalışma dizini ==="
          pwd

      - name: Build APK
        run: |
          python3 -c "
          content = '''rootProject.name = 'teleon'
          include ':app'
          '''
          with open('android/settings.gradle', 'w') as f:
              f.write(content)
          print('settings.gradle yazildi:')
          with open('android/settings.gradle') as f:
              print(f.read())
          "

          python3 -c "
          content = '''buildscript {
              ext {
                  buildToolsVersion = \"34.0.0\"
                  minSdkVersion = 21
                  compileSdkVersion = 34
                  targetSdkVersion = 34
                  ndkVersion = \"26.1.10909125\"
                  kotlinVersion = \"1.9.24\"
              }
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath(\"com.android.tools.build:gradle:8.3.2\")
                  classpath(\"com.facebook.react:react-native-gradle-plugin:0.74.1\")
                  classpath(\"org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.24\")
              }
          }
          '''
          with open('android/build.gradle', 'w') as f:
              f.write(content)
          print('build.gradle yazildi')
          "

          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: teleon-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: android/app/build/reports/
          retention-days: 7
