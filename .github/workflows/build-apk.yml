name: Build Debug APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Setup Gradle wrapper
        run: |
          mkdir -p android/gradle/wrapper

          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > android/gradlew << 'GRADLEW'
          #!/bin/sh
          APP_HOME=$(cd "$(dirname "$0")" && pwd -P)
          CLASSPATH="$APP_HOME/gradle/wrapper/gradle-wrapper.jar"
          exec java -Xmx64m -Xms64m \
            "-Dorg.gradle.appname=$(basename "$0")" \
            -classpath "$CLASSPATH" \
            org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW
          chmod +x android/gradlew

          curl -sL -o android/gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar"

          echo "gradlew: $(wc -c < android/gradlew) bytes"
          echo "wrapper.jar: $(wc -c < android/gradle/wrapper/gradle-wrapper.jar) bytes"

      - name: Create assets folder
        run: mkdir -p android/app/src/main/assets

      - name: Bundle JS
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Debug settings.gradle
        run: |
          echo "=== settings.gradle içeriği ==="
          cat android/settings.gradle
          echo ""
          echo "=== node_modules klasörü var mı? ==="
          ls node_modules/@react-native/gradle-plugin/ | head -5
          echo ""
          echo "=== Çalışma dizini ==="
          pwd

      - name: Build APK
        run: |
          PLUGIN_PATH="${GITHUB_WORKSPACE}/node_modules/@react-native/gradle-plugin"

          # Plugin'i derle ve local maven'e publish et
          cd "$PLUGIN_PATH"
          chmod +x gradlew

          # Version'ı bul
          VERSION=$(grep -m1 "^version" build.gradle.kts | sed 's/version = "\(.*\)"/\1/' | tr -d ' ')
          echo "Plugin version: $VERSION"

          ./gradlew publishToMavenLocal --no-daemon -x test 2>&1 | tail -5
          cd "${GITHUB_WORKSPACE}"

          # Local maven'de var mı?
          find ~/.m2 -name "*.jar" -path "*react-native*" 2>/dev/null | head -5

          python3 << PYEOF
          import os, subprocess, glob

          workspace = os.environ['GITHUB_WORKSPACE']
          home = os.environ['HOME']
          plugin_path = f"{workspace}/node_modules/@react-native/gradle-plugin"

          # Version bul
          with open(f'{plugin_path}/build.gradle.kts') as f:
              content = f.read()
          import re
          m = re.search(r'version\s*=\s*"([^"]+)"', content)
          version = m.group(1) if m else "0.74.1"
          print(f"Version: {version}")

          # JAR var mı?
          jars = glob.glob(f"{home}/.m2/**/react-native-gradle-plugin*.jar", recursive=True)
          print(f"JARs: {jars}")

          settings = f"""pluginManagement {{
              repositories {{
                  mavenLocal()
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }}
          }}
          plugins {{ id("com.facebook.react.settings") version "{version}" }}
          rootProject.name = "teleon"
          include(":app")
          """

          subprocess.run(['rm', '-f', 'android/settings.gradle', 'android/settings.gradle.kts'])
          with open('android/settings.gradle.kts', 'w') as f:
              f.write(settings)
          print("Yazildi")
          PYEOF

          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | head -60
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: teleon-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: android/app/build/reports/
          retention-days: 7
