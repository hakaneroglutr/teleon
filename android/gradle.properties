# android/gradle.properties
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# React Native
android.useAndroidX=true
android.enableJetifier=true
reactNativeArchitectures=arm64-v8a,armeabi-v7a,x86_64

# New Architecture — Faz 2'de etkinleştir
newArchEnabled=false
hermesEnabled=true

# Keystore — CI/CD ortamında override edilecek
# TELEON_UPLOAD_STORE_FILE=teleon-release.keystore
# TELEON_UPLOAD_STORE_PASSWORD=
# TELEON_UPLOAD_KEY_ALIAS=teleon
# TELEON_UPLOAD_KEY_PASSWORD=
