// android/app/build.gradle
apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    // Hermes JS engine
    hermesEnabled = true
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.teleon"

    defaultConfig {
        applicationId "com.teleon.app"
        minSdkVersion rootProject.ext.minSdkVersion      // 21 (Android 5.0)
        targetSdkVersion rootProject.ext.targetSdkVersion // 34
        versionCode 1
        versionName "1.0.0"

        // ABI splits — küçük APK boyutu için
        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a", "x86_64"
        }

        // MultiDex — büyük bağımlılıklar için
        multiDexEnabled true
    }

    splits {
        abi {
            reset()
            enable true
            universalApk true
            include "arm64-v8a", "armeabi-v7a", "x86_64"
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (project.hasProperty('TELEON_UPLOAD_STORE_FILE')) {
                storeFile file(TELEON_UPLOAD_STORE_FILE)
                storePassword TELEON_UPLOAD_STORE_PASSWORD
                keyAlias TELEON_UPLOAD_KEY_ALIAS
                keyPassword TELEON_UPLOAD_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

dependencies {
    // React Native
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // ── VLC ────────────────────────────────────────────────────────────────
    implementation "org.videolan.android:libvlc-all:3.6.0"

    // ── ExoPlayer / Media3 ─────────────────────────────────────────────────
    implementation "androidx.media3:media3-exoplayer:1.3.1"
    implementation "androidx.media3:media3-exoplayer-hls:1.3.1"
    implementation "androidx.media3:media3-exoplayer-dash:1.3.1"
    implementation "androidx.media3:media3-exoplayer-rtsp:1.3.1"
    implementation "androidx.media3:media3-ui:1.3.1"
    implementation "androidx.media3:media3-session:1.3.1"
    implementation "androidx.media3:media3-datasource-okhttp:1.3.1"

    // ── Network ────────────────────────────────────────────────────────────
    implementation "com.squareup.okhttp3:okhttp:4.12.0"
    implementation "com.squareup.okhttp3:logging-interceptor:4.12.0"

    // ── JSON ───────────────────────────────────────────────────────────────
    implementation "com.google.code.gson:gson:2.10.1"

    // ── Firebase ──────────────────────────────────────────────────────────
    implementation platform("com.google.firebase:firebase-bom:32.7.4")
    implementation "com.google.firebase:firebase-analytics"
    implementation "com.google.firebase:firebase-crashlytics"

    // ── AndroidX ──────────────────────────────────────────────────────────
    implementation "androidx.core:core-ktx:1.13.1"
    implementation "androidx.appcompat:appcompat:1.7.0"
    implementation "androidx.multidex:multidex:2.0.1"
    implementation "androidx.work:work-runtime-ktx:2.9.0"
    implementation "androidx.lifecycle:lifecycle-runtime-ktx:2.8.2"

    // ── Coroutines ────────────────────────────────────────────────────────
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1"
}

// ProGuard için VLC ve React Native istisnalar
// → proguard-rules.pro dosyasına bakınız
